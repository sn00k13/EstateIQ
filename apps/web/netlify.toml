[build]
  base    = "apps/web"
  command = "npm install && npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION    = "20"
  NODE_OPTIONS    = "--max-old-space-size=4096"
  NPM_FLAGS       = "--legacy-peer-deps"
  TURBO_TELEMETRY_DISABLED = "1"
  # next-auth/react inlines NEXTAUTH_URL in client chunks (public site URL). TERMII_SENDER_ID often matches visible SMS sender text.
  # NEXT_PUBLIC_* keys are intentionally embedded in JS (public Turnstile site key, same pattern as Paystack publishable key).
  SECRETS_SCAN_OMIT_KEYS = "NEXTAUTH_URL,TERMII_SENDER_ID,NEXT_PUBLIC_TURNSTILE_SITE_KEY,NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY, NEXT_PUBLIC_CONTACT_COMPANY, NEXT_PUBLIC_CONTACT_ADDRESS, NEXT_PUBLIC_CONTACT_PHONE, NEXT_PUBLIC_WHATSAPP_NUMBER, NEXT_PUBLIC_CONTACT_EMAIL, MAILER_SMTP_USER"
  # Set in Netlify UI (Site → Environment variables), not in this file: DATABASE_URL, AUTH_SECRET,
  # NEXTAUTH_URL (https://kynjo.homes), and any SMTP/OAuth keys your routes use.
  #
  # DATABASE_URL: use your hosted Postgres URL (e.g. Railway). Scope must include Functions (or "All
  # scopes") — "Builds only" leaves API routes / Prisma without a URL at runtime. Redeploy after
  # adding or changing secrets.